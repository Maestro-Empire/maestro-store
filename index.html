<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO | ELITE 2026</title>
    <style>
        :root { --gold: #c5a059; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 0; }
        
        .header { padding: 40px 20px; background: #1c2128; border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); font-size: 2.5rem; margin: 0; letter-spacing: 5px; }

        .tab-bar { display: flex; justify-content: center; background-color: #1c2128; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .tab-link { background: none; border: none; color: #8b949e; padding: 10px 20px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .tab-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .content-section { display: none; padding: 30px; }
        .content-section.active { display: block; }

        /* التنسيق العرضي 5 في الصف */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1300px; margin: 0 auto; }

        .card { background-color: var(--card-bg); border: 1px solid #30363d; border-radius: 15px; padding: 15px; }
        .card img { 
            width: 100%; 
            height: 150px; 
            border-radius: 50%; /* دائرية */
            object-fit: cover; 
            border: 2px solid var(--gold); 
            display: block;
            margin: 0 auto 10px;
        }
        .card-title { font-size: 0.8rem; color: var(--gold); margin-bottom: 5px; }

        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

        <p style="color:#8b949e">المجموعة الحصرية 2026</p>
    </div>

        <button class="tab-link active" onclick="openTab('glasses')">نظارات</button>
        <button class="tab-link" onclick="openTab('perfumes')">عطور</button>
        <button class="tab-link" onclick="openTab('watches')">ساعات</button>
    </div>

            <div class="card"><img src="https://images.pexels.com/photos/46710/pexels-photo-46710.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-title">نظارة 2</div></div>

            <div class="card"><img src="https://images.pexels.com/photos/1549004/pexels-photo-1549004.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-title">نظارة 5</div></div>
            <div class="card"><img src="https://images.pexels.com/photos/39716/sunglasses-glasses-dark-glasses-shades-39716.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-title">نظارة 6</div></div>

            <div class="card"><img src="https://images.pexels.com/photos/2811088/pexels-photo-2811088.jpeg?auto=compress&cs=tinysrgb&w=400"><div class="card-title">نظارة 8</div></div>

        </div>
    </div>

    <script>
        function openTab(name) {
            var i, sections, tabs;
            sections = document.getElementsByClassName("content-section");
            for (i = 0; i < sections.length; i++) { sections[i].classList.remove("active"); }
            tabs = document.getElementsByClassName("tab-link");
            for (i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            document.getElementById(name).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
