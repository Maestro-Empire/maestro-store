<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAESTRO | THE MINIMALIST SEAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel&display=swap" rel="stylesheet">
    <style>
        :root { 
            --silver-base: #c0c0c0;
            --void-black: #020202;
        }
        body { background-color: var(--void-black); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .seal-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الكلمة من فوق بحروف منفصلة */
        .top-label {
            font-family: 'Cinzel', serif;
            color: var(--silver-base);
            font-size: 1rem;
            letter-spacing: 15px; /* مسافات كبيرة بين الحروف */
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* الدائرة المركزية وحرف H */
        .main-circle {
            width: 220px; height: 220px;
            border: 2px solid var(--silver-base); /* إطار أنحف وأشيك */
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.1);
        }

        .emblem-h {
            font-family: 'Great Vibes', cursive;
            color: var(--silver-base);
            font-size: 9rem;
            margin: 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        /* التاريخ من تحت بحروف منفصلة */
        .bottom-label {
            font-family: 'Cinzel', serif;
            color: var(--silver-base);
            font-size: 1.2rem;
            letter-spacing: 20px; /* مسافات واسعة جداً */
            margin-top: 35px;
        }
    </style>
</head>
<body>
    <div class="seal-wrapper">
        <div class="top-label">E S T A B L I S H E D</div>
        
        <div class="main-circle">
            <h1 class="emblem-h">H</h1>
        </div>

        <div class="bottom-label">2 0 2 6</div>
    </div>
</body>
</html>
