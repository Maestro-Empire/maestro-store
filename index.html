<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro | المجلة النهائية</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 60px 20px; position: relative; width: 100%; }
        .bg-h { font-size: 250px; color: #0a0a0a; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; font-weight: 900; }
        .brand-name { font-size: 50px; letter-spacing: 10px; margin: 0; font-weight: bold; }
        .section-title { font-size: 24px; margin: 40px 0 20px; border-bottom: 2px solid #d4af37; padding-bottom: 10px; width: 80%; text-align: center; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; width: 95%; max-width: 1300px; }
        .card { background: #080808; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #d4af37; transform: translateY(-5px); }
        .card img { width: 100%; height: 240px; object-fit: cover; border-radius: 5px; border-bottom: 3px solid #d4af37; }
        .info { color: #888; font-size: 14px; margin: 15px 0; }
        .heart { font-size: 24px; color: #333; cursor: pointer; }
    </style>
</head>
