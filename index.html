<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو - Maestro Empire</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { padding: 40px 20px; background: linear-gradient(145deg, #161b22, #0b0e14); border-bottom: 2px solid #d4af37; }
        h1 { color: #d4af37; font-size: 2.8em; margin: 0; }
        .stats-bar { background: #1c2128; padding: 10px; font-size: 0.9em; color: #d4af37; border-bottom: 1px solid #30363d; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: #d4af37; transform: scale(1.02); }
        /* جعل الصور دائرية */
        .card img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #d4af37; margin-bottom: 15px; }
        .card-text { font-weight: bold; color: #d4af37; font-size: 1.3em; margin-bottom: 10px; }
        /* زر الإعجاب */
        .like-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .like-btn:hover { background: #d4af37; color: #000; }
        .footer { padding: 30px; color: #8b949e; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>إمبراطورية المايسترو</h1>
        <p style="color: #aeb9c7;">عطور فاخرة • قصات عالمية • سيجار • نظارات • سيارات</p>
    </div>

    <div class="stats-bar">
        <span>👁️ عدد الزوار: 1,452</span> | <span>❤️ الإعجابات: 840</span>
    </div>

    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400" alt="عطور">
            <div class="card-text">عطور فاخرة</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400" alt="سيارات">
            <div class="card-text">سيارات فارهة</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1510132334053-157930969623?w=400" alt="سيجار">
            <div class="card-text">سيجار أصلي</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400" alt="نظارات">
            <div class="card-text">نظارات عالمية</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 إمبراطورية المايسترو - فخامة الاختيار
    </div>

</body>
</html>
