<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الشركة - المسودة الأولى</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. إعدادات الصفحة الأساسية (الخلفية السوداء الفخمة) */
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); /* خلفية سوداء بتدرج خفيف */
            margin: 0;
            padding: 0;
            color: #b8860b; /* اللون الذهبي الملكي للنصوص */
            font-family: 'Cinzel', serif; /* الخط الملكي الأساسي */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* الغاء التوسيط ليكون التصميم في الركن */
            align-items: flex-start; 
        }

        /* 2. حاوية "كتلة المعلومات" في أقصى الشمال */
        .brand-corner {
            position: absolute; /* تثبيت في مكان محدد */
            top: 20px; /* مسافة بسيطة من الأعلى */
            left: 20px; /* مسافة بسيطة من الشمال */
            display: flex;
            flex-direction: column; /* العناصر فوق بعضها */
            align-items: flex-start; /* محاذاة للشمال */
            border-bottom: 1px solid #b8860b; /* السطر الرفيع جداً تحت الكتلة كلها */
            padding-bottom: 5px; /* مسافة بسيطة فوق السطر */
        }

        /* 3. تنسيق اسم الشركة (السطر الأول) */
        .company-name {
            font-family: 'Great+Vibes', cursive; /* خط التوقيع الفاخر */
            font-size: 24px; /* مقاس صغير وملموم */
            font-weight: bold;
            margin-bottom: 2px; /* مسافة صغيرة جداً تحت الاسم */
        }

        /* 4. تنسيق الماركة والسنة (السطر الثاني) */
        .brand-details {
            font-size: 14px; /* أصغر وأرفع */
            letter-spacing: 1px; /* مسافة بين الحروف للشياكة */
            color: #d4af37; /* ذهبي أفتح قليلاً */
        }

    </style>
</head>
<body>

    <div class="brand-corner">
        <div class="company-name">اسم الشركة هنا</div>
        
        <div class="brand-details">H • EST. 2026</div>
    </div>

</body>
</html>
