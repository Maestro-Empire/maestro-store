<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000; /* خلفية سوداء */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', serif;
            position: relative;
        }

        /* العلامة المائية: حرف H ضخم جداً وباهت في الخلفية */
        .watermark {
            position: absolute;
            font-size: 80vh; 
            color: #111; /* رمادي غامق جداً قريب من الأسود */
            z-index: 0;
            user-select: none;
        }

        /* تصميم الاسم والبيانات */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #b8860b; /* لون ذهبي */
        }

        .main-name {
            font-size: 60px;
            margin: 0;
            border-bottom: 2px solid #b8860b; /* السطر الرفيع */
            padding-bottom: 10px;
        }

        .sub-text {
            font-size: 16px;
            margin-top: 10px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="watermark">H</div>

    <div class="content">
        <div class="main-name">The Maestro</div>
        <div class="sub-text">PREMIUM COLLECTION 2026</div>
    </div>

</body>
</html>
