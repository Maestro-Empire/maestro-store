<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro | المايسترو</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            padding: 100px 20px;
            position: relative;
            width: 100%;
        }
        .bg-h {
            font-size: 250px;
            color: #111;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            font-weight: bold;
        }
        .brand-name {
            font-size: clamp(30px, 8vw, 60px);
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px;
            width: 90%;
            max-width: 1300px;
        }
        .card {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.4s ease;
        }
        .card:hover {
            border-color: #d4af37;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border-bottom: 3px solid #d4af37;
            margin-bottom: 20px;
            background-color: #111;
        }
        .card h3 {
            font-size: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="bg-h">H</div>
        <h1 class="brand-name">THE MAESTRO</h1>
    </div>

    <div class="grid">
        <div class="card"><img src="رابط_1" alt="Maestro 1"><h3>موديل 1</h3></div>
        <div class="card"><img src="رابط_2" alt="Maestro 2"><h3>موديل 2</h3></div>
        <div class="card"><img src="رابط_3" alt="Maestro 3"><h3>موديل 3</h3></div>
        <div class="card"><img src="رابط_4" alt="Maestro 4"><h3>موديل 4</h3></div>
        <div class="card"><img src="رابط_5" alt="Maestro 5"><h3>موديل 5</h3></div>
        <div class="card"><img src="رابط_6" alt="Maestro 6"><h3>موديل 6</h3></div>
        <div class="card"><img src="رابط_7" alt="Maestro 7"><h3>موديل 7</h3></div>
        <div class="card"><img src="رابط_8" alt="Maestro 8"><h3>موديل 8</h3></div>
        <div class="card"><img src="رابط_9" alt="Maestro 9"><h3>موديل 9</h3></div>
        <div class="card"><img src="رابط_10" alt="Maestro 10"><h3>موديل 10</h3></div>
    </div>

</body>
</html>
