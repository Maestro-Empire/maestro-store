<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro | المجلة الحصرية 2026</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 70px 20px; position: relative; width: 100%; overflow: hidden; }
        .bg-h { font-size: clamp(150px, 30vw, 250px); color: #0a0a0a; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; font-weight: 900; opacity: 0.8; }
        .brand-name { font-size: clamp(30px, 8vw, 55px); letter-spacing: 10px; margin: 0; font-weight: bold; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .section-title { font-size: 24px; margin: 50px 0 25px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; width: 85%; text-align: center; color: #fff; letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; width: 95%; max-width: 1300px; }
        .card { background: #050505; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; transition: 0.4s; }
        .card:hover { border-color: #d4af37; transform: translateY(-7px); box-shadow: 0 8px 25px rgba(212,175,55,0.2); }
        .card img { width: 100%; height: 240px; object-fit: cover; border-radius: 8px; border-bottom: 3px solid #d4af37; margin-bottom: 15px; background: #111; }
        .p-name { font-size: 17px; color: #fff; font-weight: bold; margin-bottom: 5px; }
        .p-desc { color: #888; font-size: 13px; margin-bottom: 15px; line-height: 1.5; padding: 0 5px; }
        .interaction { display: flex; justify-content: center; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid #111; }
        .heart { font-size: 22px; cursor: pointer; color: #333; transition: 0.2s; }
        .heart:hover { color: #d4af37; }
    </style>
</head>
