<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel&display=swap" rel="stylesheet">
    <style>
        :root { 
            --silver: #e0e0e0;
            --dark-silver: #888888;
            --black-bg: #050505;
        }

        /* 🌌 1. الخلفية بمحفظتها (الخلفية السينمائية) */
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, var(--black-bg) 70%);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            color: var(--silver);
        }

        .container { text-align: center; }

        /* 🔘 2. الختم (الدائرة والحروف المنفصلة) */
        .seal-area {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .label-text {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 12px; /* حروف منفصلة فخمة */
            text-transform: uppercase;
            color: var(--dark-silver);
        }

        .circle-border {
            width: 200px;
            height: 200px;
            border: 1px solid var(--silver); /* خط واحد رفيع وشيك */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .main-h {
            font-family: 'Great Vibes', cursive;
            font-size: 8rem;
            margin: 0;
            /* تأثير البروز 2 مللي */
            text-shadow: 2px 2px 0px #333, 4px 4px 10px rgba(0,0,0,0.8);
        }

        /* 🖋️ 3. اسم المايسترو */
        .brand-name {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin-top: 10px;
            color: var(--silver);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="label-text">E S T A B L I S H E D</div>

        <div class="seal-area">
            <div class="circle-border">
                <h1 class="main-h">H</h1>
            </div>
        </div>

        <div class="label-text">2 0 2 6</div>

        <div class="brand-name">Maestro</div>
    </div>

</body>
</html>
