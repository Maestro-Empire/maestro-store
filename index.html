<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #000; color: #d1c7a8; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* تصميم اللوجو كما في الصورة */
        .logo-section { padding: 40px; position: relative; }
        .big-h { font-size: 150px; opacity: 0.8; color: #d1c7a8; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }
        .logo-content { position: relative; z-index: 2; }
        .circle-h { width: 40px; height: 40px; border: 1px solid gold; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: gold; }
        .main-title { font-size: 35px; color: gold; margin: 0; font-family: 'Times New Roman', serif; }

        /* شبكة الـ 10 صور */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .item {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
        }
        .item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="logo-section">
        <div class="big-h">H</div>
        <div class="logo-content">
            <div class="circle-h">H</div>
            <h1 class="main-title">The Maestro</h1>
            <p>PREMIUM BRAND • EST. 2026</p>
        </div>
    </div>

    <div class="gallery">
        <div class="item">
            <img src="رابط_صورة_النظارة_هنا" alt="نظارات">
            <p>نظارات فاخرة</p>
        </div>
        <div class="item">
            <img src="رابط_صورة_الساعة_هنا" alt="ساعات">
            <p>ساعات ملكية</p>
        </div>
        </div>

</body>
</html>
