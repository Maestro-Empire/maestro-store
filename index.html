<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { padding: 40px 20px; background: #161b22; border-bottom: 2px solid #d4af37; }
        h1 { color: #d4af37; font-size: 2.5em; margin: 0; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 30px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; width: 280px; }
        .card img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #d4af37; }
        .card-title { color: #d4af37; font-size: 1.3em; margin: 15px 0; }
        .like-btn { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>إمبراطورية المايسترو</h1>
        <p>عطور • سيارات • سيجار • نظارات</p>
    </div>

    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400">
            <div class="card-title">نظارات حديثة</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400">
            <div class="card-title">سيارات فارهة</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1510132334053-157930969623?w=400">
            <div class="card-title">سيجار ملكي</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=400">
            <div class="card-title">عطور فاخرة</div>
            <button class="like-btn">❤️ أعجبني</button>
        </div>
    </div>

</body>
</html>
