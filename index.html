<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro | مجلة المايسترو الرسمية</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 80px 20px; position: relative; width: 100%; overflow: hidden; }
        .bg-h { font-size: 300px; color: #0a0a0a; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; font-weight: 900; opacity: 0.8; }
        .brand-name { font-size: clamp(35px, 10vw, 65px); letter-spacing: 12px; margin: 0; font-weight: bold; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .section-title { font-size: 26px; margin: 60px 0 30px; border-bottom: 2px solid #d4af37; padding-bottom: 15px; width: 85%; text-align: center; color: #fff; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 35px; padding: 20px; width: 95%; max-width: 1300px; }
        .card { background: #050505; border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; transition: 0.4s; position: relative; }
        .card:hover { border-color: #d4af37; transform: translateY(-10px); box-shadow: 0 10px 30px rgba(212,175,55,0.2); }
        .card img { width: 100%; height: 260px; object-fit: cover; border-radius: 10px; border-bottom: 4px solid #d4af37; margin-bottom: 20px; background: #111; }
        .p-name { font-size: 19px; color: #fff; font-weight: bold; margin-bottom: 8px; }
        .p-desc { color: #888; font-size: 14px; margin-bottom: 20px; line-height: 1.6; padding: 0 10px; }
        .interaction { display: flex; justify-content: center; align-items: center; gap: 10px; padding-top: 15px; border-top: 1px solid #111; }
        .heart { font-size: 24px; cursor: pointer; color: #333; transition: 0.3s; }
        .heart:hover { color: #d4af37; transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="header">
        <div class="bg-h">H</div>
        <h1 class="brand-name">THE MAESTRO</h1>
    </div>

    <h2 class="section-title">النظارات | EYEWEAR</h2>
    <div class="grid">
        <script>
            const gImg = "https://images.pexels.com/photos/701877/pexels-photo-701877.jpeg?auto=compress&cs=tinysrgb&w=600";
            for(let i=1; i<=10; i++) {
                document.write(`
                <div class="card">
                    <img src="${gImg}" alt="نظارة">
                    <div class="p-name">موديل نظارات M${i}</div>
                    <div class="p-desc">عدسات Polarized حماية UV400، إطار تيتانيوم مرن، تصميم إيطالي عصري.</div>
                    <div class="interaction"><span class="heart">❤</span> <small>أعجبني</small></div>
                </div>`);
            }
        </script>
    </div>

    <h2 class="section-title">الساعات | WATCHES</h2>
    <div class="grid">
        <script>
            const wImg = "https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?auto=compress&cs=tinysrgb&w=600";
            for(let i=1; i<=10; i++) {
                document.write(`
                <div class="card">
                    <img src="${wImg}" alt="ساعة">
                    <div class="p-name">ساعة رويال W${i}</div>
                    <div class="p-desc">ماكينة أوتوماتيك سويسرية، زجاج Sapphire ضد الخدش، سير من الجلد الطبيعي الفاخر.</div>
                    <div class="interaction"><span class="heart">❤</span> <small>أعجبني</small></div>
                </div>`);
            }
        </script>
    </div>

    <h2 class="section-title">العطور | LUXURY SCENTS</h2>
    <div class="grid">
        <script>
            const pImg = "https://images.pexels.com/photos/965989/pexels-photo-965989.jpeg?auto=compress&cs=tinysrgb&w=600";
            for(let i=1; i<=10; i++) {
                document.write(`
                <div class="card">
                    <img src="${pImg}" alt="عطر">
                    <div class="p-name">عطر جولد P${i}</div>
                    <div class="p-desc">ثبات يدوم 48 ساعة، نوتات فرنسية ملكية (عود وعنبر)، تركيز Extrait de Parfum.</div>
                    <div class="interaction"><span class="heart">❤</span> <small>أعجبني</small></div>
                </div>`);
            }
        </script>
    </div>

</body>
</html>
