<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>رادار المايسترو للبورصة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .dashboard { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; width: 200px; border-bottom: 5px solid #007bff; }
        .price { font-size: 24px; color: #00ff00; font-weight: bold; margin: 10px 0; }
        .symbol { font-size: 18px; color: #aaaaaa; }
    </style>
</head>
<body>

    <h1>📊 رادار المايسترو مؤمن عاصم</h1>
    <div class="dashboard">
        <div class="card">
            <h3>فوري</h3>
            <div class="symbol">FWRY.CA</div>
            <div id="price-fwry" class="price">جاري التحميل...</div>
        </div>
        <div class="card">
            <h3>كوبر</h3>
            <div class="symbol">COPR.CA</div>
            <div id="price-copr" class="price">جاري التحميل...</div>
        </div>
        <div class="card">
            <h3>بيلتون</h3>
            <div class="symbol">BTFH.CA</div>
            <div id="price-btfh" class="price">جاري التحميل...</div>
        </div>
    </div>

    <script>
        // ده المفتاح اللي لسه مطلعينه سوا يا مايسترو
        const apiKey = "37774136952d43109da33116817290b5"; 
        
        async function getPrices() {
            const symbols = "FWRY,COPR,BTFH"; // رموز الأسهم
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${symbols}&apikey=${apiKey}`);
                const data = await response.json();
                
                // تحديث الأسعار في الصفحة
                if(data.FWRY) document.getElementById('price-fwry').innerText = data.FWRY.price + " EGP";
                if(data.COPR) document.getElementById('price-copr').innerText = data.COPR.price + " EGP";
                if(data.BTFH) document.getElementById('price-btfh').innerText = data.BTFH.price + " EGP";
            } catch (error) {
                console.error("خطأ في جلب الأسعار:", error);
            }
        }

        // تحديث الأسعار كل دقيقة
        getPrices();
        setInterval(getPrices, 60000);
    </script>
</body>
</html>
