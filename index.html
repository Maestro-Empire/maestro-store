<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO | ULTRA MODERN</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* هيدر سينمائي */
        .header { height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1f26 0%, #05070a 100%); border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
        .header h1 { font-size: 2.5rem; color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 8px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }

        /* تابات عصرية جداً */
        .tab-bar { display: flex; justify-content: center; gap: 10px; padding: 20px; position: sticky; top: 0; z-index: 100; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(10px); }
        .tab-link { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 25px; border-radius: 50px; cursor: pointer; transition: 0.4s; font-weight: 500; }
        .tab-link.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); border-color: var(--gold); }

        .content-section { display: none; padding: 20px; animation: slideUp 0.6s ease; }
        .content-section.active { display: block; }

        /* التنسيق العالمي: 2 في كل صف */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* كارت "أحدث من الحديث" */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 30px; 
            padding: 20px; 
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        
        .card img { 
            width: 140px; height: 140px; border-radius: 50%; 
            object-fit: cover; border: 2px solid var(--gold); 
            transition: 0.5s;
        }
        .card:hover img { transform: rotate(5deg); box-shadow: 0 0 25px var(--gold); }

        .card-title { color: var(--gold); margin: 15px 0; font-size: 0.9rem; letter-spacing: 1px; }

        .like-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .like-btn:hover { background: var(--gold); color: black; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .social-footer { padding: 40px; margin-top: 50px; background: #0a0c10; }
        .social-link { color: var(--gold); text-decoration: none; margin: 0 15px; font-size: 0.9rem; opacity: 0.7; transition: 0.3s; }
        .social-link:hover { opacity: 1; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAESTRO</h1>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 5px;">ULTRA LUXURY EMPIRE</p>
    </div>

    <div class="tab-bar">
        <button class="tab-link active" onclick="openTab('g')">النظارات</button>
        <button class="tab-link" onclick="openTab('p')">العطور</button>
        <button class="tab-link" onclick="openTab('w')">الساعات</button>
    </div>

    <div id="g" class="content-section active"><div class="grid" id="g-grid"></div></div>
    <div id="p" class="content-section"><div class="grid" id="p-grid"></div></div>
    <div id="w" class="content-section"><div class="grid" id="w-grid"></div></div>

    <div class="social-footer">
        <a href="#" class="social-link">FACEBOOK</a>
        <a href="#" class="social-link">INSTAGRAM</a>
        <a href="#" class="social-link">WHATSAPP</a>
    </div>

    <script>
        const items = {
            g: ['https://picsum.photos/id/1/300', 'https://picsum.photos/id/2/300', 'https://picsum.photos/id/3/300', 'https://picsum.photos/id/4/300', 'https://picsum.photos/id/5/300', 'https://picsum.photos/id/6/300', 'https://picsum.photos/id/7/300', 'https://picsum.photos/id/8/300', 'https://picsum.photos/id/9/300', 'https://picsum.photos/id/11/300'],
            p: ['https://picsum.photos/id/12/300', 'https://picsum.photos/id/13/300', 'https://picsum.photos/id/14/300', 'https://picsum.photos/id/15/300', 'https://picsum.photos/id/16/300', 'https://picsum.photos/id/17/300', 'https://picsum.photos/id/18/300', 'https://picsum.photos/id/19/300', 'https://picsum.photos/id/21/300', 'https://picsum.photos/id/22/300'],
            w: ['https://picsum.photos/id/23/300', 'https://picsum.photos/id/24/300', 'https://picsum.photos/id/25/300', 'https://picsum.photos/id/26/300', 'https://picsum.photos/id/27/300', 'https://picsum.photos/id/28/300', 'https://picsum.photos/id/29/300', 'https://picsum.photos/id/31/300', 'https://picsum.photos/id/32/300', 'https://picsum.photos/id/33/300']
        };

        function create(type, id, label) {
            const grid = document.getElementById(id);
            items[type].forEach((url, i) => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${url}">
                        <div class="card-title">${label}</div>
                        <button class="like-btn" onclick="this.innerHTML='✅ DONE'; this.style.background='#d4af37'; this.style.color='black';">❤️ LIKE</button>
                    </div>`;
            });
        }

        create('g', 'g-grid', 'MODERN VISION');
        create('p', 'p-grid', 'ROYAL SCENT');
        create('w', 'w-grid', 'ELITE TIME');

        function openTab(name) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo({ top: 150, behavior: 'smooth' });
        }
    </script>
</body>
</html>
