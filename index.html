<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو - Maestro Empire</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        
        .header { padding: 40px 20px; background: linear-gradient(145deg, #1c2128, var(--dark)); border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); font-size: 2.5em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .motto { color: #8b949e; margin-top: 10px; font-size: 1.1em; }

        /* شريط الأقسام */
        .tab-bar { display: flex; justify-content: center; background-color: #1c2128; padding: 10px; sticky; top: 0; z-index: 1000; border-bottom: 1px solid #30363d; overflow-x: auto; }
        .tab-link { background: none; border: none; color: white; padding: 10px 20px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .tab-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* المحتوى */
        .content-section { display: none; animation: fadeIn 0.5s; padding: 30px; }
        .content-section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
