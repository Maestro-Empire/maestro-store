<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | إمبراطورية المايسترو</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0e14; --card-bg: #161b22; }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        
        /* الهيدر الفخم */
        .header { 
            padding: 60px 20px; 
            background: linear-gradient(180deg, #1c2128 0%, var(--dark) 100%); 
            border-bottom: 3px solid var(--gold); 
        }
        h1 { 
            color: var(--gold); 
            font-size: 3rem; 
            margin: 0; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .motto { color: #8b949e; font-size: 1.2rem; margin-top: 15px; letter-spacing: 2px; }

        /* عنوان القسم */
        .section-title {
            margin-top: 40px;
            color: var(--gold);
            font-size: 1.8rem;
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* شبكة الصور (5 أعمدة جنب بعض) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 25px; 
            max-width: 1400px; 
            margin: 40px auto; 
            padding: 0 30px;
        }

        /* الكارت الفخم */
        .card { 
            background-color: var(--card-bg); 
            border: 1px solid #30363d; 
            border-radius: 20px; 
            padding: 20px; 
            transition: 0.4s ease-in-out; 
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--gold); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.6); 
        }

        /* الصورة الدائرية المبروزة */
