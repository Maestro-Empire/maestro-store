<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO | ELITE COLLECTION 2026</title>
    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Times New Roman', serif; margin: 0; padding: 0; }
        
        .header { text-align: center; padding: 40px 20px; border-bottom: 1px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 3rem; letter-spacing: 10px; margin: 0; }

        /* الشبكة العرضية 5 صور جنب بعض */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .ad-box {
            background: #111;
            border: 1px solid #222;
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .ad-box:hover { border-color: var(--gold); transform: scale(1.02); }

        .ad-box img {
            width: 100%;
            height: 180px; 
            object-fit: cover;
            display: block;
            filter: contrast(1.1);
        }

        .ad-title {
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--gold);
            background: rgba(0,0,0,0.9);
            font-weight: bold;
        }

        /* الموبايل */
        @media (max-width: 1000px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }

        footer { text-align: center; padding: 40px; color: #333; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAESTRO</h1>
        <p>THE NEW REFINED COLLECTION</p>
    </div>

    <div class="grid-container">
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400"><div class="ad-title">01 - EYEWEAR</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400"><div class="ad-title">02 - PERFUMES</div></div> <div class="ad-box"><img src="https://images.unsplash.com/photo-1585336261022-69c6e29670d8?w=400"><div class="ad-title">03 - STATIONERY</div></div> <div class="ad-box"><img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400"><div class="ad-title">04 - WATCHES</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"><div class="ad-title">05 - AUDIO</div></div>
        
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"><div class="ad-title">06 - LUXURY GOODS</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"><div class="ad-title">07 - FOOTWEAR</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1526170315870-ef6d82f58396?w=400"><div class="ad-title">08 - ACCESSORIES</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=400"><div class="ad-title">09 - FASHION</div></div>
        <div class="ad-box"><img src="https://images.unsplash.com/photo-1505156868547-9b49f4df4e04?w=400"><div class="ad-title">10 - DEVICES</div></div>
    </div>

    <footer>MAESTRO EMPIRE &copy; 2026</footer>

</body>
</html>
