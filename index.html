<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | 2026</title>
    <style>
        :root { --gold: #c5a059; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Times New Roman', serif; margin: 0; padding: 0; text-align: center; }
        
        /* الهيدر الفخم */
        .header { padding: 50px 20px; background: linear-gradient(145deg, #1c2128, var(--dark)); border-bottom: 2px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 3.5rem; margin: 0; letter-spacing: 10px; }
        .motto { color: #8b949e; margin-top: 15px; font-size: 1.2rem; letter-spacing: 3px; }

        /* شريط الأقسام المطور */
        .tab-bar { display: flex; justify-content: center; background-color: #1c2128; padding: 15px; sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); }
        .tab-link { background: none; border: none; color: #8b949e; padding: 10px 25px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .tab-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* المحتوى بنظام الشبكة العرضية (5 في كل صف) */
        .content-section { display: none; animation: fadeIn 0.5s; padding: 40px 20px; }
        .content-section.active { display: block; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 صور جنب بعض */
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* تنسيق الكارت (الصور الدائرية مع الخلفية الفخمة) */
        .ad-box {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 20px;
            transition: 0.4s;
        }
        .ad-box:hover { border-color: var(--gold); transform: translateY(-10px); }
        
        .ad-box img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; /* الصور دائرية زي ما طلبت */
            object-fit: cover; 
            border: 3px solid var(--gold); 
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .ad-title { color: var(--gold); font-size: 1rem; font-weight: bold; margin-bottom: 15px; }
        
        .like-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .like-btn:hover { background: var(--gold); color: black; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* للموبايل */
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAESTRO</h1>
        <p class="motto">EXCLUSIVE ADVERTISING • ELITE COLLECTION</p>
    </div>

    <div class="tab-bar">
        <button class="tab-link active" onclick="openTab('glasses')">النظارات (10)</button>
        <button class="tab-link" onclick="openTab('perfumes')">العطور (10)</button>
        <button class="tab-link" onclick="openTab('watches')">الساعات (10)</button>
    </div>

    <div id="glasses" class="content-section active">
        <div class="grid-container" id="glasses-grid"></div>
    </div>

    <div id="perfumes" class="content-section">
        <div class="grid-container" id="perfumes-grid"></div>
    </div>

    <div id="watches" class="content-section">
        <div class="grid-container" id="watches-grid"></div>
    </div>

    <script>
        // دالة لملء الصور تلقائياً (10 صور لكل قسم)
        function fillGrid(containerId, imgBase, titlePrefix) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= 10; i++) {
                container.innerHTML += `
                    <div class="ad-box">
                        <img src="${imgBase}&sig=${i + containerId}">
                        <div class="ad-title">${titlePrefix} ${i}</div>
                        <button class="like-btn">❤️ أعجبني</button>
                    </div>`;
            }
        }

        // ملء البيانات
        fillGrid('glasses-grid', 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=300', 'نظارة موديل');
        fillGrid('perfumes-grid', 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=300', 'عطر ملكي');
        fillGrid('watches-grid', 'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300', 'ساعة فاخرة');

        // دالة التبديل بين الأقسام
        function openTab(name) {
            var i, sections, tabs;
            sections = document.getElementsByClassName("content-section");
            for (i = 0; i < sections.length; i++) { sections[i].classList.remove("active"); }
            tabs = document.getElementsByClassName("tab-link");
            for (i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            document.getElementById(name).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>

    <footer>
        <p style="color: #333; padding: 40px;">MAESTRO EMPIRE &copy; 2026</p>
    </footer>

</body>
</html>
