<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | ELITE 2026</title>
    <style>
        :root { --gold: #c5a059; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Times New Roman', serif; text-align: center; margin: 0; padding-bottom: 50px; }
        
        /* هيدر الإمبراطورية */
        .header { padding: 50px 20px; background: linear-gradient(145deg, #1c2128, var(--dark)); border-bottom: 3px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 3rem; margin: 0; letter-spacing: 10px; text-transform: uppercase; }
        .motto { color: #8b949e; font-size: 1.2rem; margin-top: 15px; letter-spacing: 2px; }

        /* شريط الأقسام (الرايق) */
        .tab-bar { display: flex; justify-content: center; background-color: #1c2128; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--gold); overflow-x: auto; }
        .tab-link { background: none; border: none; color: #8b949e; padding: 10px 30px; cursor: pointer; font-size: 1.3rem; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        /* التعديل هنا: شيلنا رقم 10 خالص من الزراير */
        .tab-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* المحتوى */
        .content-section { display: none; animation: fadeIn 0.5s; padding: 40px 20px; }
        .content-section.active { display: block; }
        
        /* تنسيق 2 في الصف (للكل) */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 جنب بعض */
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            /* 1. تحديد عمودين فقط */
            grid-template-columns: repeat(2, 1fr); 
            
            /* 2. المسافة بين الكارتين */
            gap: 30px; 
            
            /* 3. العرض الإجمالي للمنطقة اللي فيها الصور (عشان ميبقوش فارشين قوي) */
            max-width: 800px; 
            
            /* 4. توسيط الصور في نص الصفحة */
            margin: 0 auto; 
            padding: 20px;
        }

        /* 5. مقاس الكارت نفسه عشان يكون متناسق */
        .card {
            padding: 30px;
            border-radius: 25px;
        }

        /* 6. مقاس الصورة الدائرية (تكبر شوية عشان هما 2 بس) */
        .card img {
            width: 200px; 
            height: 200px;
        }

    <div class="header">
        <h1>MAESTRO</h1>
        <p class="motto">EXCLUSIVE ADVERTISING • ELITE COLLECTION</p>
    </div>

    <div class="tab-bar">
        <button class="tab-link active" onclick="openTab('glasses')">النظارات</button>
        <button class="tab-link" onclick="openTab('perfumes')">العطور</button>
        <button class="tab-link" onclick="openTab('watches')">الساعات</button>
    </div>

    <div id="glasses" class="content-section active">
        <div class="grid" id="glasses-grid"></div>
    </div>

    <div id="perfumes" class="content-section">
        <div class="grid" id="perfumes-grid"></div>
    </div>

    <div id="watches" class="content-section">
        <div class="grid" id="watches-grid"></div>
    </div>

    <script>
        // دالة لملء الصور (10 صور لكل قسم) بنفس تنسيق الصور المختلفة
        function fillGrid(containerId, imgBase, titlePrefix, type) {
            const container = document.getElementById(containerId);
            // استخدمت الروابط المختلفة اللي جربناها وطلعت سريعة
            for (let i = 1; i <= 10; i++) {
                container.innerHTML += `
                    <div class="card">
                        <img src="${imgBase}&sig=${type}${i}">
                        <div class="card-title">${titlePrefix} ${i}</div>
                        <button class="like-btn">❤️ أعجبني</button>
                    </div>`;
            }
        }

        // ملء البيانات (10 صور مختلفة لكل قسم)
        fillGrid('glasses-grid', 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400', 'نظارة موديل', 'glass');
        fillGrid('perfumes-grid', 'https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=400', 'عطر ملكي', 'perfume');
        fillGrid('watches-grid', 'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400', 'ساعة فاخرة', 'watch');

        // دالة التبديل بين الأقسام
        function openTab(name) {
            var i, sections, tabs;
            sections = document.getElementsByClassName("content-section");
            for (i = 0; i < sections.length; i++) { sections[i].classList.remove("active"); }
            tabs = document.getElementsByClassName("tab-link");
            for (i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            document.getElementById(name).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>

    <footer>
        <p style="color: #333; padding: 40px; font-size: 0.8rem;">MAESTRO EMPIRE &copy; 2026</p>
    </footer>

</body>
