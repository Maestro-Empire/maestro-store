<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAESTRO EMPIRE | CIRCULAR SEAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-base: #b8860b;
            --void-black: #020202;
        }
        body { background-color: var(--void-black); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .seal-container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }

        /* الدائرة المركزية وحرف H */
        .main-circle {
            width: 200px; height: 200px;
            border: 4px solid var(--gold-base);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .emblem-h {
            font-family: 'Great Vibes', cursive;
            color: var(--gold-base);
            font-size: 8rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* النصوص المنحنية (فوق وتحت) */
        .curved-text {
            position: absolute;
            width: 100%; height: 100%;
            font-family: 'Cinzel', serif;
            color: var(--gold-base);
            font-size: 1.2rem;
            letter-spacing: 5px;
        }
        .top-text { top: -20px; text-align: center; width: 100%; }
        .bottom-text { bottom: -20px; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div class="seal-container">
        <div class="top-text curved-text">ESTABLISHED</div>
        
        <div class="main-circle">
            <h1 class="emblem-h">H</h1>
        </div>

        <div class="bottom-text curved-text">2026</div>
    </div>
</body>
</html>
