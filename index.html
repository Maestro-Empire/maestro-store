<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | إمبراطورية المايسترو</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0e14; --card-bg: #161b22; --beige: #d1c7a8; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }

        /* =========================================
           1. تنسيق اللوجو الثابت (من الصورة الأصلية)
           ========================================= */
        .header-section {
            position: relative;
            padding: 60px 20px;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }
        .big-h-bg {
            position: absolute;
            font-size: 180px;
            font-weight: bold;
            color: var(--beige);
            opacity: 0.8;
            z-index: 1;
            font-family: serif;
        }
        .logo-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .small-h-circle {
            width: 35px; height: 35px;
            border: 1.5px solid var(--gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 10px; color: var(--gold); font-weight: bold;
        }
        .brand-name {
            font-size: 40px; color: var(--gold);
            margin: 0; font-family: 'Times New Roman', serif; font-style: italic;
        }
        .tagline { font-size: 10px; letter-spacing: 4px; color: var(--beige); margin-top: 5px; }

        /* =========================================
           2. تنسيق شبكة الصور (5 أعمدة)
           ========================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px; max-width: 1400px; margin: 40px auto; padding: 0 20px;
        }
        .card { 
            background-color: var(--card-bg); border: 1px solid #30363d; 
            border-radius: 20px; padding: 15px; transition: 0.4s; 
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { 
            width: 140px; height: 140px; border-radius: 50%; 
            object-fit: cover; border: 3px solid var(--gold); margin-bottom: 10px; 
        }
        .card-title { color: var(--gold); font-size: 1rem; font-weight: bold; margin-bottom: 10px; }
        .like-btn { 
            background: none; border: 1px solid var(--gold); color: var(--gold); 
            padding: 5px 15px; border-radius: 20px; cursor: pointer; 
        }

        /* للموبايل */
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="big-h-bg">H</div>
        <div class="logo-content">
            <div class="small-h-circle">H</div>
            <h1 class="brand-name">The Maestro</h1>
            <div class="tagline">PREMIUM BRAND • EST. 2026</div>
        </div>
    </div>

    <div class="grid-container" id="main-grid">
        </div>

    <script>
        const images = [
            'https://images.pexels.com/photos/701877/pexels-photo-701877.jpeg?w=400',
            'https://images.pexels.com/photos/46710/pexels-photo-46710.jpeg?w=400',
            'https://images.pexels.com/photos/1499477/pexels-photo-1499477.jpeg?w=400',
            'https://images.pexels.com/photos/1362550/pexels-photo-1362550.jpeg?w=400',
            'https://images.pexels.com/photos/1549004/pexels-photo-1549004.jpeg?w=400',
            'https://images.pexels.com/photos/39716/sunglasses-glasses-dark-glasses-shades-39716.jpeg?w=400',
            'https://images.pexels.com/photos/185764/pexels-photo-185764.jpeg?w=400',
            'https://images.pexels.com/photos/2811088/pexels-photo-2811088.jpeg?w=400',
            'https://images.pexels.com/photos/1493108/pexels-photo-1493108.jpeg?w=400',
            'https://images.pexels.com/photos/165448/pexels-photo-165448.jpeg?w=400'
        ];

        const grid = document.getElementById('main-grid');
        images.forEach((src, i) => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${src}">
                    <div class="card-title">نظارة موديل ${i+1}</div>
                    <button class="like-btn">❤️ أعجبني</button>
                </div>
            `;
        });
    </script>
</body>
</html>
