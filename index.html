<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو - Maestro Empire</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        
        .header { padding: 40px 20px; background: linear-gradient(145deg, #1c2128, var(--dark)); border-bottom: 2px solid var(--gold); }
        h1 { color: var(--gold); font-size: 2.5em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .motto { color: #8b949e; margin-top: 10px; font-size: 1.1em; }

        /* شريط الأقسام */
        .tab-bar { display: flex; justify-content: center; background-color: #1c2128; padding: 10px; sticky; top: 0; z-index: 1000; border-bottom: 1px solid #30363d; overflow-x: auto; }
        .tab-link { background: none; border: none; color: white; padding: 10px 20px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .tab-link.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* المحتوى */
        .content-section { display: none; animation: fadeIn 0.5s; padding: 30px; }
        .content-section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }

        /* الكروت والصور الدائرية */
        .card { background-color: var(--card-bg); border: 1px solid #30363d; border-radius: 20px; padding: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card-title { font-size: 1.2em; color: var(--gold); margin-bottom: 10px; }
        
        .like-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .like-btn:hover { background: var(--gold); color: black; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>إمبراطورية المايسترو</h1>
        <p class="motto">عطور فاخرة • سيارات فارهة • سيجار ملكي • نظارات حديثة</p>
    </div>

    <div class="tab-bar">
        <button class="tab-link active" onclick="openTab('glasses')">النظارات (10)</button>
        <button class="tab-link" onclick="openTab('cars')">السيارات (10)</button>
        <button class="tab-link" onclick="openTab('cigars')">السيجار (10)</button>
    </div>

    <div id="glasses" class="content-section active">
        <div class="grid">
            <script>
                const glassImgs = [
                    'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400',
                    'https://images.unsplash.com/photo-1577803645773-f96470509666?w=400',
                    'https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400',
                    'https://images.unsplash.com/photo-1508296695146-257a814070b4?w=400',
                    'https://images.unsplash.com/photo-1591076482161-42ce6da69f67?w=400',
                    'https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400',
                    'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
                    'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400',
                    'https://images.unsplash.com/photo-1577803645773-f96470509666?w=400',
                    'https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400'
                ];
                glassImgs.forEach((src, i) => {
                    document.write(`<div class="card"><img src="${src}"><div class="card-title">نظارة موديل ${i+1}</div><button class="like-btn">❤️ أعجبني</button></div>`);
                });
            </script>
        </div>
    </div>

    <div id="cars" class="content-section">
        <div class="grid">
            <script>
                const carImgs = [
                    'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400',
                    'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=400',
                    'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=400',
                    'https://images.unsplash.com/photo-1502877338535-766e1452684a?w=400',
                    'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400',
                    'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400',
                    'https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=400',
                    'https://images.unsplash.com/photo-1502877338535-766e1452684a?w=400',
                    'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400',
                    'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=400'
                ];
                carImgs.forEach((src, i) => {
                    document.write(`<div class="card"><img src="${src}"><div class="card-title">سيارة فارهة ${i+1}</div><button class="like-btn">❤️ أعجبني</button></div>`);
                });
            </script>
        </div>
    </div>

    <div id="cigars" class="content-section">
        <div class="grid">
            <script>
                const cigarImgs = [
                    'https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?w=400',
                    'https://images.unsplash.com/photo-1510132334053-157930969623?w=400',
                    'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400',
                    'https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?w=400',
                    'https://images.unsplash.com/photo-1510132334053-157930969623?w=400',
                    'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400',
                    'https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?w=400',
                    'https://images.unsplash.com/photo-1510132334053-157930969623?w=400',
                    'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400',
                    'https://images.unsplash.com/photo-1527181152855-fc03fc7949c8?w=400'
                ];
                cigarImgs.forEach((src, i) => {
                    document.write(`<div class="card"><img src="${src}"><div class="card-title">سيجار ملكي ${i+1}</div><button class="like-btn">❤️ أعجبني</button></div>`);
                });
            </script>
        </div>
    </div>

    <script>
        function openTab(name) {
            var i, sections, tabs;
            sections = document.getElementsByClassName("content-section");
            for (i = 0; i < sections.length; i++) { sections[i].className = sections[i].className.replace(" active", ""); }
            tabs = document.getElementsByClassName("tab-link");
            for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(name).className += " active";
            event.currentTarget.className += " active";
        }
    </script>
</body>
</html>
