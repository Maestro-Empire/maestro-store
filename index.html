<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو - Maestro Empire</title>
    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 0; }
        
        .header { padding: 40px 20px; background: #000; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); font-size: 3rem; margin: 0; letter-spacing: 5px; text-transform: uppercase; font-family: 'Times New Roman', serif; }
        .motto { color: #888; font-size: 1.1em; margin-top: 10px; letter-spacing: 2px; }

        .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        .section-title { color: var(--gold); font-size: 2.2rem; margin-bottom: 40px; border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 10px; }

        /* الكروت الفخمة */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background-color: #000; border: 1px solid #222; border-radius: 15px; padding: 25px; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        /* الصورة الفخمة الواحدة */
        .card img { width: 100%; height: 350px; border-radius: 10px; object-fit: cover; border: 2px solid #222; margin-bottom: 15px; }
        .card:hover img { border-color: var(--gold); }
        
        .card-title { font-size: 1.4em; color: var(--gold); margin-bottom: 10px; }
        .card-desc { color: #ccc; font-size: 1em; margin-bottom: 15px; }
        
        .like-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .like-btn:hover { background: var(--gold); color: black; }

        footer { padding: 40px; border-top: 1px solid #111; color: #444; font-size: 0.8em; letter-spacing: 2px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAESTRO</h1>
        <p class="motto">THE ART OF LUXURY LIVING</p>
    </div>

    <div class="container">
        <div class="section-title">مختارات النخبة</div>
        
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=500" alt="نظارات">
                <div class="card-title">Modern Eyewear</div>
                <p class="card-desc">أحدث صيحات النظارات العالمية</p>
                <button class="like-btn" onclick="this.innerHTML='❤️ Added'">أعجبني</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500" alt="سيارات">
                <div class="card-title">Elite Motors</div>
                <p class="card-desc">عالم القوة والفخامة</p>
                <button class="like-btn" onclick="this.innerHTML='❤️ Added'">أعجبني</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1510132334053-157930969623?w=500" alt="سيجار">
                <div class="card-title">Premium Selection</div>
                <p class="card-desc">سيجار هافانا وعطور ملكية</p>
                <button class="like-btn" onclick="this.innerHTML='❤️ Added'">أعجبني</button>
            </div>
        </div>
    </div>

    <footer>
        MAESTRO EMPIRE &copy; 2026 | DESIGNED FOR THE ELITE
    </footer>

</body>
</html>
