<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>The Maestro Luxury Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            overflow: hidden; /* لمنع التمرير مؤقتاً */
            color: #b8860b;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            position: relative;
        }

        /* 1. الخلفية المائية (Watermark) */
        body::before {
            content: "H"; /* رمز الماركة */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60vh; /* حجم ضخم */
            font-weight: bold;
            color: rgba(184, 134, 11, 0.03); /* شفافية عالية جداً (مائية) */
            z-index: -1;
            user-select: none;
        }

        /* 2. حاوية الاسم (الخط الفرنسي) في أقصى الشمال */
        .header-brand {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .main-title {
            font-family: 'Great Vibes', cursive; /* الخط الفرنسي */
            font-size: 32px;
            margin: 0;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(184, 134, 11, 0.3); /* سطر رفيع */
            padding-bottom: 5px;
        }

        .sub-details {
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="header-brand">
        <div class="main-title">The Maestro H</div>
        <div class="sub-details">Premium Collection • 2026</div>
    </div>

</body>
</html>
