<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro Empire | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* 1. الأساسيات */
        body {
            background-color: #000;
            color: #d1c7a8;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. منطقة اللوجو (التفصيل اللي طلبته) */
        .header-logo {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* الـ H الخلفية (أقل حبة) */
        .bg-letter {
            position: absolute;
            font-size: 150px; /* المقاس المظبوط */
            font-weight: bold;
            color: rgba(209, 199, 168, 0.4);
            z-index: 1;
            font-family: serif;
        }

        /* المحتوى الأمامي (الأصفر والدايرة) */
        .fg-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .small-circle {
            width: 35px;
            height: 35px;
            border: 1.5px solid #b8860b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            color: #b8860b;
            font-weight: bold;
        }

        .brand-name {
            font-family: 'Great Vibes', cursive;
            font-size: 40px;
            color: #b8860b;
            margin: 0;
        }

        .est-tag {
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 5px;
            color: #d1c7a8;
        }

        /* 3. شبكة الـ 10 صور */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 في الصف للموبايل */
            gap: 15px;
            width: 95%;
            max-width: 1100px;
            padding-bottom: 50px;
        }

        .product-item {
            background: #0a0a0a;
            border: 1px solid rgba(184, 134, 11, 0.2);
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .product-item:hover {
            border-color: #b8860b;
        }

        .img-box {
            width: 100%;
            height: 180px;
            background: #151515;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* شاشات أكبر */
        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(5, 1fr); } /* 5 في الصف للكمبيوتر */
        }
    </style>
</head>
<body>

    <header class="header-logo">
        <div class="bg-letter">H</div>
        <div class="fg-content">
            <div class="small-circle">H</div>
            <h1 class="brand-name">The Maestro</h1>
            <div class="est-tag">PREMIUM BRAND • 2026</div>
        </div>
    </header>

    <section class="products-grid">
        <div class="product-item"><div class="img-box">🕶️</div><p>نظارات 1</p></div>
        <div class="product-item"><div class="img-box">🕶️</div><p>نظارات 2</p></div>
        <div class="product-item"><div class="img-box">⌚</div><p>ساعات 1</p></div>
        <div class="product-item"><div class="img-box">⌚</div><p>ساعات 2</p></div>
        <div class="product-item"><div class="img-box">✨</div><p>عطور 1</p></div>
        <div class="product-item"><div class="img-box">✨</div><p>عطور 2</p></div>
        <div class="product-item"><div class="img-box">💼</div><p>إكسسوار 1</p></div>
        <div class="product-item"><div class="img-box">💼</div><p>إكسسوار 2</p></div>
        <div class="product-item"><div class="img-box">💎</div><p>قسم 9</p></div>
        <div class="product-item"><div class="img-box">👑</div><p>قسم 10</p></div>
    </section>

</body>
</html>
