<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو | MAESTRO EMPIRE</title>
    <style>
        :root { --gold: #d4af37; --dark: #06080a; --card-bg: #12161d; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; }
        
        /* هيدر السلطان */
        .header { padding: 30px; background: linear-gradient(to bottom, #1c2128, var(--dark)); border-bottom: 2px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 2.2rem; margin: 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        
        /* عداد الإعجابات الملكي */
        .stat-bar { background: var(--gold); color: black; padding: 5px; font-weight: bold; font-size: 0.9rem; position: sticky; top: 0; z-index: 2000; }

        .tab-bar { display: flex; justify-content: center; background: #1c2128; padding: 10px; position: sticky; top: 31px; z-index: 1000; border-bottom: 1px solid #30363d; }
        .tab-link { background: none; border: none; color: #8b949e; padding: 10px 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-link.active { color: var(--gold); transform: scale(1.1); }

        .content-section { display: none; padding: 20px; animation: fadeIn 0.8s ease; }
        .content-section.active { display: block; }

        /* ممر السلطان: 2 في كل صف */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card { 
            background-color: var(--card-bg); 
            border: 1px solid #252d38; 
            border-radius: 20px; 
            padding: 15px; 
            transition: 0.4s;
            cursor: pointer;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        
        .card img { 
            width: 130px; height: 130px; border-radius: 50%; 
            object-fit: cover; border: 2px solid var(--gold); margin-bottom: 10px; 
        }

        .card-title { color: var(--gold); font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }
        
        .like-btn { 
            background: none; border: 1px solid var(--gold); color: var(--gold); 
            padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
        }
        .like-btn.active { background: var(--gold); color: black; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="stat-bar">إجمالي تفاعل الجمهور: <span id="like-count">0</span> إعجاب</div>

    <div class="header">
        <h1>إمبراطورية المايسترو</h1>
        <p style="color: #666; font-size: 0.8rem;">فخامة السلطان.. دقة الاختيار</p>
    </div>

    <div class="tab-bar">
        <button class="tab-link active" onclick="openTab('g')">النظارات</button>
        <button class="tab-link" onclick="openTab('p')">العطور</button>
        <button class="tab-link" onclick="openTab('w')">الساعات</button>
    </div>

    <div id="g" class="content-section active"><div class="grid" id="g-grid"></div></div>
    <div id="p" class="content-section"><div class="grid" id="p-grid"></div></div>
    <div id="w" class="content-section"><div class="grid" id="w-grid"></div></div>
