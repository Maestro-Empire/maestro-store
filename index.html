<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | EYEWEAR</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0e14; --card-bg: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* الهيدر */
        .header { padding: 50px 20px; background: #1c2128; border-bottom: 3px solid var(--gold); }
        h1 { color: var(--gold); font-size: 3rem; margin: 0; letter-spacing: 8px; text-transform: uppercase; }
        .motto { color: #8b949e; font-size: 1.2rem; margin-top: 10px; }

        /* سحر التنسيق العرضي (الشبكة) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* هنا السر: 5 أعمدة جنب بعض */
            gap: 20px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* الكارت الفخم */
        .card { 
            background-color: var(--card-bg); 
            border: 1px solid #30363d; 
            border-radius: 20px; 
            padding: 20px; 
            transition: 0.4s; 
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* الصورة الدائرية */
        .card img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--gold); 
            margin-bottom: 15px; 
        }

        .card-title { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        
        .like-btn { 
            background: none; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .like-btn:hover { background: var(--gold); color: black; }

        /* عشان يشتغل على الموبايل ويفضل شكله حلو */
        @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>MAESTRO</h1>
        <p class="motto">المايسترو • فخامة النظارات الملكية</p>
    </div>

    <div class="grid-container">
        <div class="card"><img src="https://images.pexels.com/photos/701877/pexels-photo-701877.jpeg?w=400"><div class="card-title">نظارة موديل 1</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/46710/pexels-photo-46710.jpeg?w=400"><div class="card-title">نظارة موديل 2</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/1499477/pexels-photo-1499477.jpeg?w=400"><div class="card-title">نظارة موديل 3</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/1362550/pexels-photo-1362550.jpeg?w=400"><div class="card-title">نظارة موديل 4</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/1549004/pexels-photo-1549004.jpeg?w=400"><div class="card-title">نظارة موديل 5</div><button class="like-btn">❤️ أعجبني</button></div>
        
        <div class="card"><img src="https://images.pexels.com/photos/39716/sunglasses-glasses-dark-glasses-shades-39716.jpeg?w=400"><div class="card-title">نظارة موديل 6</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/185764/pexels-photo-185764.jpeg?w=400"><div class="card-title">نظارة موديل 7</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/2811088/pexels-photo-2811088.jpeg?w=400"><div class="card-title">نظارة موديل 8</div><button class="like-btn">❤️ أعجبني</button></div>
        <div class="card"><img src="https://images.pexels.com/photos/1493108/pexels-photo-1493108.jpeg?w=400"><div class="card-title">نظارة موديل 9</div><button class="like-btn">❤️ أعجبني</button></div>

    </div>

    <footer style="padding: 40px; color: #333;">MAESTRO EMPIRE &copy; 2026</footer>

</body>
</html>
