<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المايسترو</title>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { font-size: 32px; margin-bottom: 30px; color: #d4af37; border-bottom: 3px solid #d4af37; padding-bottom: 10px; }
        .container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 25px; width: 280px; text-align: center; border-bottom: 5px solid #007bff; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .name { font-size: 24px; font-weight: bold; color: #ffffff; }
        .symbol { font-size: 14px; color: #777; margin-bottom: 15px; }
        .price { font-size: 28px; color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📊 المايسترو</h1>

    <div class="container">
        <div class="card">
            <div class="name">فوري</div>
            <div class="symbol">FWRY.CA</div>
            <div id="FWRY" class="price">...نبحث عن السعر</div>
        </div>
        <div class="card">
            <div class="name">كوبر</div>
            <div class="symbol">COPR.CA</div>
            <div id="COPR" class="price">...نبحث عن السعر</div>
        </div>
        <div class="card">
            <div class="name">بيلتون</div>
            <div class="symbol">BTFH.CA</div>
            <div id="BTFH" class="price">...نبحث عن السعر</div>
        </div>
    </div>

    <script>
        // ده المفتاح اللي في صورتك الأخيرة يا بطل
        const apiKey = "3adc6418870349b1967765352590456b"; 
        const stocks = "FWRY.CA,COPR.CA,BTFH.CA";

        async function updatePrices() {
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${stocks}&apikey=${apiKey}`);
                const data = await response.json();

                if(data["FWRY.CA"]) document.getElementById("FWRY").innerText = parseFloat(data["FWRY.CA"].price).toFixed(2) + " ج.م";
                if(data["COPR.CA"]) document.getElementById("COPR").innerText = parseFloat(data["COPR.CA"].price).toFixed(2) + " ج.م";
                if(data["BTFH.CA"]) document.getElementById("BTFH").innerText = parseFloat(data["BTFH.CA"].price).toFixed(2) + " ج.م";
            } catch (e) { console.log("خطأ في الشبكة"); }
        }

        updatePrices();
        setInterval(updatePrices, 60000); 
    </script>
</body>
</html>
