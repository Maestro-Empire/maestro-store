<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المايسترو - Maestro-Empire</title>
    <style>
        body { background-color: #0b0e14; color: #e6edf3; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header { padding: 30px; background: #161b22; border-radius: 20px; margin-bottom: 20px; border: 1px solid #d4af37; }
        h1 { color: #d4af37; font-size: 2.5em; margin: 0; }
        .main-banner { width: 100%; max-width: 850px; border-radius: 15px; margin-bottom: 30px; border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #161b22; border-radius: 15px; overflow: hidden; border: 1px solid #30363d; }
        .card img { width: 100%; height: auto; display: block; }
        .footer { margin-top: 50px; color: #8b949e; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>إمبراطورية المايسترو</h1>
        <p>إدارة: مؤمن محمد (Moamen Mohamed)</p>
        <p>عطور فخمة • قصات عالمية • سيجار • نظارات وسيارات</p>
    </div>

    <img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_18.png" class="main-banner">

    <div class="grid">
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
        <div class="card"><img src="https://raw.githubusercontent.com/Maestro-Empire/maestro-store/main/image_2.png"></div>
    </div>

    <div class="footer">© 2026 Maestro-Empire</div>

</body>
</html>
