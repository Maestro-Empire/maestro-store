<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المايسترو</title>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { font-size: 32px; margin-bottom: 30px; color: #d4af37; border-bottom: 3px solid #d4af37; padding-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 25px; width: 280px; text-align: center; border-bottom: 5px solid #007bff; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .name { font-size: 24px; font-weight: bold; color: #ffffff; }
        .symbol { font-size: 14px; color: #777; margin-bottom: 15px; }
        .price { font-size: 28px; color: #00ff41; font-weight: bold; }
        .loading { font-size: 18px; color: #00ff41; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>📊 المايسترو</h1>

    <div class="container">
        <div class="card">
            <div class="name">فوري</div>
            <div class="symbol">FWRY.CA</div>
            <div id="FWRY" class="price loading">جاري جلب السعر...</div>
        </div>
        <div class="card">
            <div class="name">كوبر</div>
            <div class="symbol">COPR.CA</div>
            <div id="COPR" class="price loading">جاري جلب السعر...</div>
        </div>
        <div class="card">
            <div class="name">بيلتون</div>
            <div class="symbol">BTFH.CA</div>
            <div id="BTFH" class="price loading">جاري جلب السعر...</div>
        </div>
    </div>

    <script>
        // المفتاح اللي أنت بعته يا مايسترو
        const apiKey = "3adc6418870349b1967765352590456b"; 
        const stocks = "FWRY.CA,COPR.CA,BTFH.CA";

        async function fetchPrices() {
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${stocks}&apikey=${apiKey}`);
                const data = await response.json();

                if(data["FWRY.CA"]) updateUI("FWRY", data["FWRY.CA"].price);
                if(data["COPR.CA"]) updateUI("COPR", data["COPR.CA"].price);
                if(data["BTFH.CA"]) updateUI("BTFH", data["BTFH.CA"].price);
                
            } catch (error) {
                console.log("خطأ في الاتصال");
            }
        }

        function updateUI(id, price) {
            const el = document.getElementById(id);
            if(el && price) {
                el.innerText = parseFloat(price).toFixed(2) + " ج.م";
                el.classList.remove('loading');
            }
        }

        fetchPrices();
        setInterval(fetchPrices, 60000); 
    </script>
</body>
</html>
