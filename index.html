<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO EMPIRE | GLOBAL LOGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { 
            --royal-gold: #b8860b; /* ذهبي ملكي غامق ونحاسي (Dark Goldenrod) - لون العملات والأسهم */
            --void-black: #020202; /* أسود قاتم جداً (أعمق من الفحم) - خلفية فخمة */
            --glass-bg: rgba(184, 134, 11, 0.05); /* تفرغ خلفي خفيف جداً */
        }
        
        body { background-color: var(--void-black); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;}

        /* حاوية الشعار العالمي */
        .global-brand-container { text-align: center; position: relative; }

        /* 👑 1. الرمز الملكي العالمي (The Global Emblem) */
        .global-emblem {
            position: relative;
            width: 150px; /* مقاس فخم للشعار */
            height: 150px;
            margin: 0 auto 40px;
            border: 3px solid var(--royal-gold); /* إطار ذهبي سميك وقوي */
            border-radius: 50%; /* شكل الكرة الأرضية والدائرة المحكمة */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(184, 134, 11, 0.3); /* ظل يعطي عمقاً فخماً */
            background: var(--glass-bg); /* تفرغ خلفي */
            overflow: hidden; /* لاحتواء العناصر */
        }
        
        /* تأثير خطوط الطول والعرض للكرة الأرضية */
        .global-emblem::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-linear-gradient(90deg, transparent, transparent 15px, rgba(184, 134, 11, 0.1) 16px),
                        repeating-linear-gradient(0deg, transparent, transparent 15px, rgba(184, 134, 11, 0.1) 16px);
            opacity: 0.5;
        }

        /* تأثير السحابة السينمائية (تأثير ضبابي خفيف) */
        .global-emblem::after {
            content: "";
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(184, 134, 11, 0.05), transparent);
            filter: blur(10px);
            opacity: 0.3;
        }
        
        /* حرف H (المحفور الملكي) داخل الرمز */
        .emblem-h {
            font-family: 'Cinzel Decorative', serif; /* خط مزخرف وقوي */
            color: var(--royal-gold);
            font-size: 5rem; /* حجم كبير وبارز */
            margin: 0;
            line-height: 1;
            position: relative;
            z-index: 10; /* فوق خطوط الكرة والسحابة */
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5); /* تأثير الحفر والبروز */
        }

        /* 👑 التاج فوق الرمز العالمي */
        .global-emblem .crown {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: var(--royal-gold);
            z-index: 20;
        }

        /* 🖋️ 2. التوقيع الفرنسي الفخم (The Signature) */
        .signature-text {
            font-family: 'Great Vibes', cursive; /* خط فرنسي انسيابي كأنه توقيع ريشة - تخانة وفخامة */
            color: var(--royal-gold);
            font-size: 5.5rem; /* مقاس كبير جداً وفخم */
            margin: 0;
            letter-spacing: -2px; /* حروف متصلة */
            text-shadow: 3px 3px 12px rgba(0,0,0,0.9); /* ظل عميق لإبراز التوقيع */
            font-weight: 400; /* انسيابية الخط */
        }

        /* اسم الإمبراطورية بالخط الرفيع والواضح */
        .empire-subtext {
            color: rgba(184, 134, 11, 0.6); /* ذهبي خافت جداً */
            font-family: 'Cinzel Decorative', serif;
            font-size: 1rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="global-brand-container">
        <div class="global-emblem">
            <div class="crown">👑</div>
            <h2 class="emblem-h">H</h2>
        </div>
        
        <h1 class="signature-text">Maestro</h1>
        <p class="empire-subtext">Global Empire | Collection</p>
    </div>

</body>
</html>
