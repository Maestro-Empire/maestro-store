<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Maestro Empire | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000; /* خلفية سوداء */
            margin: 0;
            padding: 0;
            color: #d1c7a8; /* اللون البيج من الصورة */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* حاوية الموقع بالكامل */
        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* =========================================
           كتلة اللوجو (ثابتة كما في الصورة تماماً)
           ========================================= */
        .logo-block {
            position: relative;
            width: 300px; /* ملموم جوه المربع الأسود */
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(193, 154, 107, 0.1); /* إطار خفيف جداً المربع الأسود */
            margin-bottom: 40px; /* مسافة فوق الصور */
            margin-top: 20px;
        }
